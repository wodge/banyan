name: details
props:
  type: object
  properties:
    attributes:
      type: Drupal\Core\Template\Attribute
    summary_attributes:
      type: Drupal\Core\Template\Attribute
    required:
      type: [boolean, 'null']
      default: false
      description: 'Specifies if the details element is required.'
    errors:
      type: ['array', 'string', 'null']
      default: []
      description: 'Any errors for this details element, may not be set.'
    description:
      type: ['string', 'null']
      default: ''
      description: 'The description of the details element, may not be set.'
    children:
      type: ['array', 'string', 'null']
      default: []
      description: 'The children of the details element.'
    value:
      type: string
      default: ''
      description: 'The value of the details element.'