config:
  import:
    admin_toolbar: "*"
    admin_toolbar_tools: "*"
    block_content: "*"
    bootstrap_layout_builder: "*"
    bootstrap_styles: "*"
    coffee: "*"
    colorbox: "*"
    components: "*"
    dashboard: "*"
    dblog: "*"
    field_ui: "*"
    filter: "*"
    gin:
      - gin.settings
      - block.block.gin_breadcrumbs
      - block.block.gin_content
      - block.block.gin_help
      - block.block.gin_local_actions
      - block.block.gin_messages
      - block.block.gin_page_title
      - block.block.gin_primary_local_tasks
    help: "*"
    image: "*"
    language: "*"
    layout_builder: "*"
    media: "*"
    media_library: "*"
    metatag: "*"
    metatag_open_graph: "*"
    node: "*"
    paragraphs: "*"
    pathauto: "*"
    project_browser: "*"
    redirect: "*"
    search: "*"
    search_api:
      - search_api.settings
    search_api_db: "*"
    shortcut: "*"
    simple_sitemap: "*"
    taxonomy: "*"
    text: "*"
    user:
      - core.entity_form_mode.user.register
      - core.entity_view_mode.user.compact
      - core.entity_view_mode.user.full
      - system.action.user_block_user_action
      - system.action.user_cancel_user_action
      - system.action.user_unblock_user_action
      - user.flood
      - user.mail
      - search.page.user_search
      - views.view.user_admin_people
      - views.view.who_s_new
      - views.view.who_s_online
    views: "*"
    webform: "*"

  actions:
    # Set default front page to "/home-page"
    system.site:
      simple_config_update:
        page.front: '/welcome'

    #configure node.settings
    node.settings:
      simple_config_update:
        use_admin_theme: true

    # Configure system.mail
    system.mail:
      simple_config_update:
        interface:
          default: php_mail
          webform: webform_php_mail
        mailer_dsn:
          scheme: sendmail
          host: default
          user: null
          password: null
          port: null
          options: {}

    # Configure system.theme
    system.theme:
      simple_config_update:
        admin: gin
        default: droopler_theme
    # Configure anonymous user role
    user.role.anonymous:
      simple_config_update:
        langcode: en
        status: true
        dependencies:
          module:
            - media
            - search
            - system
        id: anonymous
        label: 'Anonymous user'
        weight: 0
        is_admin: false
        permissions:
          - 'access content'
          - 'search content'
          - 'view media'

    # Configure authenticated user role
    user.role.authenticated:
      simple_config_update:
        langcode: en
        status: true
        dependencies:
          config:
            - filter.format.webform_default
          module:
            - filter
            - media
            - search
            - system
        id: authenticated
        label: 'Authenticated user'
        weight: 1
        is_admin: false
        permissions:
          - 'access content'
          - 'search content'
          - 'use text format webform_default'
          - 'view media'

    # Configure user settings
    user.settings:
      simple_config_update:
        langcode: en
        anonymous: Anonymous
        verify_mail: true
        notify:
          cancel_confirm: true
          password_reset: true
          status_activated: true
          status_blocked: false
          status_canceled: false
          register_admin_created: true
          register_no_approval_required: true
          register_pending_approval: true
        register: visitors
        cancel_method: user_cancel_block
        password_reset_timeout: 86400
        password_strength: true

    # Disable default blocks for droopler_theme after installation
    block.block.droopler_theme_branding:
      simple_config_update:
        status: false

    block.block.droopler_theme_messages:
      simple_config_update:
        status: false

    block.block.droopler_theme_tools:
      simple_config_update:
        status: false

    block.block.droopler_theme_admin:
      simple_config_update:
        status: false

    block.block.droopler_theme_page_title:
      simple_config_update:
        status: false

    block.block.droopler_theme_local_tasks:
      simple_config_update:
        status: false

    block.block.droopler_theme_local_actions:
      simple_config_update:
        status: false

    # Set and unset Gin blocks.
    block.block.gin_admin:
      setStatus: false

    block.block.gin_branding:
      setStatus: false

    block.block.gin_local_actions:
      setRegion: content
      setWeight: -10

    block.block.gin_local_tasks:
      setStatus: false
    block.block.gin_page_title:
      setRegion: header
      setWeight: -10

    block.block.gin_primary_local_tasks:
      setRegion: header
      setWeight: -5
